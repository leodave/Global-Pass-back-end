spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: "myemail@gmail.com"
    password: "myPassword"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
jwt:
  secret: test-secret-key-that-is-long-enough-for-hs512-algorithm-minimum-64-characters-here
  expiration: 3600000

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080
  frontend-url: http://localhost:3000}
supabase:
  jwk-uri: https://mysecretcode.supabase.co/auth/v1/.well-known/jwks.json



