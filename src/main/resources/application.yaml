spring:
  profiles:
    active: prod

  application:
    name: global-pass

  # ---- Supabase PostgreSQL ----
  datasource:
    url: jdbc:postgresql://aws-1-eu-north-1.pooler.supabase.com:6543/postgres
    username: postgres.tkgfhdvvrdtxwftlxvkl
    password: Globalpass125207
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  upload-dir: uploads
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}
  supabase:
    url: ${SUPABASE_URL}
    key: ${SUPABASE_KEY}
    bucket: ${SUPABASE_BUCKET:payments}

---
# Local dev profile (H2 in-memory)
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:GlobalPassDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: root
    password: root
    settings:
      web-allow-others: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
