---
# Local dev profile (H2 in-memory)
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:GlobalPassDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: root
    password: root
    settings:
      web-allow-others: true

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
